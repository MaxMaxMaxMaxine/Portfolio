<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mcurva — Portfolio 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Helvetica+Neue:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fcfcfc;
      --ink: #000000;
      --gray: #9e9e9e;
      --mid: #6a6a6a;
      --blue: #d1e9f1;
      --dark: #373737;
      --gold-1: #ffd17d;
      --gold-2: #ffd991;
      --gold-3: #ffe0a7;
      --gold-4: #ffe9c0;
      --gold-5: #ffedcd;
      --gold-6: #fff3dc;
      --pad: 40px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Cormorant Garant', Georgia, serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 44px var(--pad);
    }

    .nav-logo {
      font-size: clamp(32px, 2.8vw, 48px);
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -0.01em;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: clamp(32px, 4.6vw, 80px);
      list-style: none;
    }

    .nav-links a {
      font-family: Helvetica, 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(14px, 1.16vw, 20px);
      color: var(--mid);
      text-decoration: none;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0;
      width: 0; height: 1px;
      background: var(--ink);
      transition: width 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .nav-links a:hover { color: var(--ink); }
    .nav-links a:hover::after { width: 100%; }

    /* ── Hero ── */
    .hero {
      padding: 52px var(--pad);
      /* extra left padding absorbs the leftward shadow so it doesn't clip */
      padding-left: calc(var(--pad) + 55px);
    }

    .hero-text {
      font-size: clamp(36px, 5.56vw, 96px);
      font-weight: 700;
      line-height: 1.05;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      /* text face matches bg → invisible, shadow does all the work */
      color: var(--bg);
      will-change: text-shadow;
      transform: translateZ(0);
      /* animation injected by JS after keyframes are built */
      /* direction + shadow set dynamically by JS */
      /* fade-in entrance so the shadow builds from nothing */
      opacity: 0;
      transition: opacity 0.8s ease 0.2s;
    }

    .hero-text.visible {
      opacity: 1;
    }

    /* ── Case 1 ── */
    .case1 {
      padding: 40px var(--pad);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .case-heading-right {
      font-size: clamp(28px, 2.78vw, 48px);
      font-weight: 300;
      line-height: 1.25;
      color: var(--ink);
      text-align: right;
      max-width: min(757px, 46%);
    }

    .case1-images {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: flex-end;
      padding: 20px 0;
    }

    .img-blue-main {
      width: min(702px, 43vw);
      aspect-ratio: 702 / 343;
      background: var(--blue);
      border-radius: 2px;
    }

    .img-blue-tag {
      width: min(212px, 13vw);
      aspect-ratio: 212 / 91;
      background: var(--blue);
      border-radius: 2px;
    }

    /* ── Case 2 ── */
    .case2 {
      padding: 40px var(--pad);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .case-heading-left {
      font-size: clamp(28px, 2.78vw, 48px);
      font-weight: 300;
      line-height: 1.25;
      color: var(--ink);
      max-width: min(757px, 46%);
    }

    /* Fan of cards */
    .fan-stage {
      position: relative;
      width: calc(100% + var(--pad) * 2);
      margin-left: calc(-1 * var(--pad));
      height: clamp(320px, 32vw, 550px);
      margin-top: 40px;
      overflow: hidden;
    }

    .fan-card {
      position: absolute;
      bottom: 0;
      width: clamp(160px, 21.3vw, 368px);
      height: clamp(182px, 24.2vw, 418px);
      border-radius: 3px;
      transform-origin: bottom center;
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.4s ease;
    }

    .fan-card:hover {
      transform: var(--base-rotate) translateY(-16px) !important;
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
      z-index: 10 !important;
    }

    /* ── Let's Connect ── */
    .connect {
      padding: 40px var(--pad);
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: flex-end;
    }

    .connect-heading {
      font-size: clamp(28px, 2.78vw, 48px);
      font-weight: 300;
      line-height: 1.25;
      color: var(--ink);
      text-align: right;
    }

    .connect-img {
      width: min(789px, 48vw);
      aspect-ratio: 789 / 510;
      background: var(--dark);
      border-radius: 2px;
    }

    /* ── Scroll reveal ── */
    .reveal {
      opacity: 0;
      transform: translateY(32px);
      transition:
        opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .reveal.in {
      opacity: 1;
      transform: translateY(0);
    }

    /* stagger siblings */
    .reveal:nth-child(2) { transition-delay: 0.1s; }
    .reveal:nth-child(3) { transition-delay: 0.2s; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      :root { --pad: 20px; }
      .case-heading-right,
      .case-heading-left { max-width: 100%; text-align: left; }
      .img-blue-main,
      .img-blue-tag,
      .connect-img { width: 100%; }
      .fan-stage { height: clamp(220px, 55vw, 380px); }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav>
    <a class="nav-logo" href="#">mcurva</a>
    <ul class="nav-links">
      <li><a href="#work">Work</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- Hero -->
  <section class="hero" id="hero">
    <h1 class="hero-text" id="heroText">
      Motion designer &amp; UX/UI designer, focused on creating digital experiences that blend visual storytelling with product thinking.
    </h1>
  </section>

  <!-- Case 1 -->
  <section class="case1" id="work">
    <h2 class="case-heading-right reveal">Helping groups reduce friction when travelling as a group</h2>
    <div class="case1-images reveal">
      <div class="img-blue-main"></div>
      <div class="img-blue-tag"></div>
    </div>
  </section>

  <!-- Case 2 -->
  <section class="case2" id="about">
    <h2 class="case-heading-left reveal">Five years of experience in news broadcasting</h2>
    <div class="fan-stage" id="fanStage"></div>
  </section>

  <!-- Let's Connect -->
  <section class="connect" id="contact">
    <p class="connect-heading reveal">Let's connect</p>
    <div class="connect-img reveal"></div>
  </section>

  <script>
    /* ─── Cursor-driven long shadow ─── */
    (function () {
      const el = document.getElementById('heroText');
      const TOTAL = 40;
      const LERP  = 0.06;           // smoothing — lower = lazier follow
      const COLOR = '158,158,158';  // light gray (#9e9e9e)

      function blurPx(i)   { return (i * 0.18).toFixed(2); }
      function alphaVal(i) { return Math.pow(1 - i / TOTAL, 1.8).toFixed(3); }

      function buildShadow(dx, dy) {
        // dx/dy are -1…1 unit direction vectors (opposite of cursor)
        const parts = [`0px 0px 0px rgba(${COLOR},1)`];
        for (let i = 1; i <= TOTAL; i++) {
          const x = (dx * i).toFixed(1);
          const y = (dy * i).toFixed(1);
          parts.push(`${x}px ${y}px ${blurPx(i)}px rgba(${COLOR},${alphaVal(i)})`);
        }
        return parts.join(',');
      }

      // Default: subtle downward-right before the user has moved
      let targetDx = 0.3, targetDy = 0.4;
      let currDx   = 0,   currDy   = 0;

      window.addEventListener('mousemove', e => {
        // Cast shadow in the direction opposite to the cursor from center
        targetDx = -(e.clientX / window.innerWidth  - 0.5) * 2;
        targetDy = -(e.clientY / window.innerHeight - 0.5) * 2;
      });

      function tick() {
        currDx += (targetDx - currDx) * LERP;
        currDy += (targetDy - currDy) * LERP;
        el.style.textShadow = buildShadow(currDx, currDy);
        requestAnimationFrame(tick);
      }

      requestAnimationFrame(() => {
        el.classList.add('visible');
        tick();
      });
    })();

    /* ─── Fan cards ─── */
    (function () {
      const stage = document.getElementById('fanStage');

      // card data: left-offset (% of stage width), bottom offset (px), rotation, color
      const cards = [
        { left: -2,  bottom: 0,  rot: -9.62, color: '#ffd17d' },
        { left:  8,  bottom: 0,  rot: -5.62, color: '#ffd991' },
        { left: 18,  bottom: 0,  rot: -2.48, color: '#ffe0a7' },
        { left: 29,  bottom: 0,  rot:  0,    color: '#ffe9c0' },
        { left: 40,  bottom: 0,  rot:  8.27, color: '#ffedcd' },
        { left: 50,  bottom: 0,  rot: 13.16, color: '#fff3dc' },
        { left: 60,  bottom: 0,  rot: 14.98, color: '#fff3dc' },
      ];

      // Arc: cards rise toward the center (index 3) and drop at edges
      const arcY = [80, 48, 20, 0, 20, 48, 80]; // px lift from bottom per card

      cards.forEach((c, i) => {
        const card = document.createElement('div');
        card.className = 'fan-card';
        const baseTransform = `rotate(${c.rot}deg) translateY(-${arcY[i]}px)`;
        card.style.cssText = `
          left: ${c.left}%;
          bottom: 0;
          background: ${c.color};
          transform: ${baseTransform};
          --base-rotate: rotate(${c.rot}deg) translateY(-${arcY[i]}px);
          z-index: ${i === 3 ? 4 : i < 3 ? i + 1 : 7 - i};
        `;
        stage.appendChild(card);
      });
    })();

    /* ─── Scroll reveal ─── */
    (function () {
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('in');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15 });

      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    })();
  </script>
</body>
</html>
